spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/authdb
    username: auth
    password: auth_password
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

auth:
  jwt:
    issuer: auth-service
    access-token-ttl-minutes: 15
  refresh-token:
    ttl-days: 30
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000
